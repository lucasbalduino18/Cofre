<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0b1418" />
<title>Carteira — Dashboard Financeiro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,400&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a1216;
    --bg-2:#0e1a20;
    --panel:#10212a;
    --panel-2:#142932;
    --line:rgba(140,180,190,.12);
    --line-strong:rgba(140,180,190,.22);
    --ink:#eaf3f3;
    --ink-soft:#a9c0c4;
    --ink-faint:#6e8a90;
    --brass:#c9a45a;
    --brass-soft:#e3c989;
    --teal:#3fb6a8;
    --pos:#52c79a;
    --neg:#e57373;
    --shadow:0 24px 60px -20px rgba(0,0,0,.7);
    --r:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Manrope',system-ui,sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(63,182,168,.10), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(201,164,90,.08), transparent 55%),
      var(--bg);
    color:var(--ink);
    min-height:100vh;
    min-height:100dvh;
    line-height:1.5;
    letter-spacing:-.01em;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums}
  .serif{font-family:'Fraunces',serif}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select{font-family:inherit}
  .hidden{display:none !important}
  ::selection{background:var(--brass);color:#15110a}

  /* ---------- LOCK SCREEN ---------- */
  #lock{
    position:fixed;inset:0;z-index:100;
    display:flex;align-items:center;justify-content:center;padding:24px;
    background:
      radial-gradient(900px 500px at 50% -10%, rgba(63,182,168,.14), transparent 60%),
      var(--bg);
  }
  .lock-card{
    width:100%;max-width:380px;text-align:center;
    animation:rise .6s cubic-bezier(.2,.7,.2,1) both;
  }
  .crest{
    width:64px;height:64px;margin:0 auto 22px;border-radius:18px;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(160deg,#15303a,#0c1d24);
    border:1px solid var(--line-strong);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.06), var(--shadow);
  }
  .crest svg{width:30px;height:30px}
  .lock-card h1{font-family:'Fraunces';font-weight:400;font-size:30px;margin:0 0 6px;letter-spacing:-.02em}
  .lock-card .sub{color:var(--ink-faint);font-size:14px;margin:0 0 28px}
  .field{position:relative;margin-bottom:14px;text-align:left}
  .field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink-faint);margin:0 0 7px 2px}
  .field input{
    width:100%;padding:14px 15px;border-radius:13px;font-size:16px;
    background:var(--panel);border:1px solid var(--line);color:var(--ink);
    transition:border-color .2s, box-shadow .2s;
  }
  .field input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 4px rgba(63,182,168,.12)}
  .btn{
    width:100%;padding:14px;border-radius:13px;font-size:15px;font-weight:600;
    background:linear-gradient(180deg,var(--brass-soft),var(--brass));color:#1a1305;
    transition:transform .12s, filter .2s; margin-top:6px;
  }
  .btn:active{transform:translateY(1px) scale(.995)}
  .btn:disabled{opacity:.5;filter:grayscale(.3)}
  .btn.ghost{background:var(--panel);color:var(--ink);border:1px solid var(--line-strong)}
  .btn.face{
    display:flex;align-items:center;justify-content:center;gap:9px;
    background:var(--panel-2);color:var(--ink);border:1px solid var(--line-strong);margin-top:14px;
  }
  .btn.face svg{width:19px;height:19px}
  .hint{font-size:12.5px;color:var(--ink-faint);margin-top:18px;line-height:1.55}
  .err{color:var(--neg);font-size:13px;margin-top:12px;min-height:18px}
  .divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--ink-faint);font-size:11px;letter-spacing:.1em}
  .divider:before,.divider:after{content:"";height:1px;flex:1;background:var(--line)}

  /* ---------- APP SHELL ---------- */
  #app{max-width:1180px;margin:0 auto;padding:max(20px,env(safe-area-inset-top)) 18px 80px}
  header.top{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 0 26px;
  }
  .brand{display:flex;align-items:center;gap:13px}
  .brand .crest{width:42px;height:42px;margin:0;border-radius:12px}
  .brand .crest svg{width:21px;height:21px}
  .brand h1{font-family:'Fraunces';font-weight:400;font-size:21px;margin:0;letter-spacing:-.01em}
  .brand .tag{font-size:11px;color:var(--ink-faint);letter-spacing:.16em;text-transform:uppercase;margin-top:1px}
  .top-actions{display:flex;gap:8px}
  .icon-btn{
    width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;
    background:var(--panel);border:1px solid var(--line);color:var(--ink-soft);transition:.2s;
  }
  .icon-btn:hover{border-color:var(--line-strong);color:var(--ink);background:var(--panel-2)}
  .icon-btn svg{width:19px;height:19px}

  /* ---------- TOTALIZER ---------- */
  .hero{
    position:relative;border-radius:24px;padding:30px 30px 8px;margin-bottom:26px;overflow:hidden;
    background:linear-gradient(155deg,#143038 0%,#0d1f27 60%,#0c1a21 100%);
    border:1px solid var(--line-strong);box-shadow:var(--shadow);
  }
  .hero:before{
    content:"";position:absolute;inset:0;opacity:.5;pointer-events:none;
    background:radial-gradient(600px 240px at 88% -30%, rgba(201,164,90,.16), transparent 60%);
  }
  .hero-grid{position:relative;display:grid;grid-template-columns:1.3fr 1fr;gap:30px;align-items:end}
  .hero .label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:10px}
  .hero .total{font-family:'JetBrains Mono';font-weight:600;font-size:clamp(34px,7vw,52px);letter-spacing:-.03em;line-height:1}
  .hero .total .cur{font-size:.48em;color:var(--brass-soft);font-weight:500;margin-right:8px;letter-spacing:0}
  .hero-stats{display:flex;gap:28px;margin-top:18px;flex-wrap:wrap}
  .hero .total-alt{font-family:'JetBrains Mono';font-size:12.5px;color:var(--ink-faint);margin-top:9px;letter-spacing:0;line-height:1.6}
  .stat .alt{font-family:'JetBrains Mono';font-size:11px;color:var(--ink-faint);margin-top:4px;line-height:1.55;max-width:200px}
  .stat .k{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint)}
  .stat .v{font-family:'JetBrains Mono';font-size:20px;font-weight:600;margin-top:3px}
  .chart-wrap{position:relative;min-height:120px}
  .chart-wrap .clabel{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);text-align:right;margin-bottom:6px}
  svg.spark{width:100%;height:120px;display:block;overflow:visible}
  .pos{color:var(--pos)} .neg{color:var(--neg)}

  /* ---------- SECTION ---------- */
  .sec-head{display:flex;align-items:baseline;justify-content:space-between;margin:30px 4px 16px}
  .sec-head h2{font-family:'Fraunces';font-weight:400;font-size:22px;margin:0}
  .sec-head .count{font-size:13px;color:var(--ink-faint)}

  /* ---------- CARDS ---------- */
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:14px}
  .card{
    position:relative;border-radius:var(--r);padding:16px;cursor:pointer;
    background:linear-gradient(160deg,var(--panel-2),var(--panel));
    border:1px solid var(--line);transition:transform .18s, border-color .2s, box-shadow .2s;
    aspect-ratio:1/1;min-height:0;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;
    animation:rise .5s cubic-bezier(.2,.7,.2,1) both;touch-action:manipulation;
  }
  .card:hover{transform:translateY(-3px);border-color:var(--line-strong);box-shadow:var(--shadow)}
  .card.dragging{z-index:50;pointer-events:none;cursor:grabbing;opacity:.97;
    box-shadow:0 30px 60px -14px rgba(0,0,0,.85);transition:none;transform-origin:center}
  .card.drop-target{border-color:var(--teal);box-shadow:0 0 0 2px var(--teal) inset}
  .card:before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:0 3px 3px 0;background:var(--acc,var(--teal))}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .card .nm{font-size:14.5px;font-weight:600;letter-spacing:-.01em;line-height:1.25}
  .card .inst{font-size:11px;color:var(--ink-faint);margin-top:2px}
  .chip{font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:4px 7px;border-radius:20px;background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--ink-soft);white-space:nowrap;flex:none}
  .chip.inv{background:rgba(201,164,90,.14);border-color:rgba(201,164,90,.42);color:var(--brass-soft)}
  .needrate{color:var(--neg);font-size:11px;font-weight:600;cursor:help}
  .rate-warn{display:inline-flex;align-items:center;gap:7px;margin-top:12px;font-size:12.5px;color:var(--brass-soft);
    background:rgba(201,164,90,.1);border:1px solid rgba(201,164,90,.32);border-radius:10px;padding:7px 12px}
  .rate-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
  .rate-row .rl{font-family:'JetBrains Mono';font-size:14px;color:var(--ink-soft);min-width:96px}
  .rate-row input{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 12px;color:var(--ink);font-family:'JetBrains Mono';font-size:14px;text-align:right}
  .rate-row input:focus{outline:none;border-color:var(--teal)}
  .rate-row .rb{font-family:'JetBrains Mono';font-size:13px;color:var(--ink-faint);min-width:40px}
  .card .bal{font-family:'JetBrains Mono';font-size:19px;font-weight:600;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card .bal .c{font-size:.6em;color:var(--ink-faint);margin-right:4px;font-weight:500}
  .card-foot{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:8px}
  .yield{display:inline-flex;align-items:center;gap:4px;font-family:'JetBrains Mono';font-size:13px;font-weight:600}
  .yield svg{width:12px;height:12px}
  .card .updated{font-size:10px;color:var(--ink-faint);white-space:nowrap}
  .add-card{
    border:1.5px dashed var(--line-strong);background:transparent;display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:8px;color:var(--ink-faint);aspect-ratio:1/1;min-height:0;border-radius:var(--r);transition:.2s;font-size:13px;
  }
  .add-card:hover{color:var(--ink);border-color:var(--teal);background:rgba(63,182,168,.04)}
  .add-card svg{width:24px;height:24px}

  .empty{text-align:center;padding:50px 20px;color:var(--ink-faint)}

  /* ---------- MODAL ---------- */
  .modal-bg{position:fixed;inset:0;z-index:60;background:rgba(4,9,11,.72);backdrop-filter:blur(7px);display:flex;align-items:flex-end;justify-content:center;padding:0;animation:fade .25s}
  @media(min-width:620px){.modal-bg{align-items:center;padding:24px}}
  .modal{
    width:100%;max-width:560px;max-height:92vh;max-height:92dvh;overflow:auto;
    background:var(--bg-2);border:1px solid var(--line-strong);
    border-radius:22px 22px 0 0;box-shadow:var(--shadow);
    animation:sheet .32s cubic-bezier(.2,.7,.2,1);
  }
  @media(min-width:620px){.modal{border-radius:22px}}
  .modal-head{position:sticky;top:0;z-index:2;display:flex;align-items:center;justify-content:space-between;
    padding:20px 22px;background:linear-gradient(180deg,var(--bg-2),rgba(14,26,32,.9));border-bottom:1px solid var(--line);backdrop-filter:blur(6px)}
  .modal-head h3{font-family:'Fraunces';font-weight:400;font-size:21px;margin:0}
  .modal-body{padding:20px 22px 26px}
  .close{width:34px;height:34px;border-radius:10px;background:var(--panel);border:1px solid var(--line);color:var(--ink-soft);display:flex;align-items:center;justify-content:center}
  .close svg{width:17px;height:17px}

  .acct-summary{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
  .mini{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px}
  .mini .k{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint)}
  .mini .v{font-family:'JetBrains Mono';font-size:22px;font-weight:600;margin-top:5px}

  .form-row{display:flex;gap:12px;margin-bottom:13px}
  .form-row .field{flex:1;margin:0}
  .field select{width:100%;padding:13px 14px;border-radius:12px;background:var(--panel);border:1px solid var(--line);color:var(--ink);font-size:15px}
  .swatches{display:flex;gap:9px;flex-wrap:wrap;margin-top:4px}
  .sw{width:30px;height:30px;border-radius:9px;cursor:pointer;border:2px solid transparent;transition:.15s}
  .sw[data-on="1"]{border-color:var(--ink);transform:scale(1.08)}

  table.months{width:100%;border-collapse:collapse;margin-top:6px}
  table.months th{font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-faint);text-align:left;padding:8px 8px;font-weight:600;border-bottom:1px solid var(--line)}
  table.months td{padding:7px 8px;border-bottom:1px solid var(--line)}
  table.months input{width:100%;background:transparent;border:1px solid transparent;border-radius:8px;padding:7px 8px;color:var(--ink);font-family:'JetBrains Mono';font-size:14px;text-align:right}
  table.months input.mlabel{text-align:left;font-family:'Manrope';color:var(--ink-soft)}
  table.months input:focus{outline:none;border-color:var(--teal);background:var(--panel)}
  table.months .del{color:var(--ink-faint);width:30px}
  table.months .del button{font-size:18px;padding:0 4px;line-height:1}
  .add-month{display:flex;gap:10px;margin-top:14px;align-items:flex-end}

  .danger{color:var(--neg)}
  .btn.sm{width:auto;padding:11px 18px;font-size:14px;margin:0}
  .btn-row{display:flex;gap:10px;margin-top:22px}
  .note{font-size:12.5px;color:var(--ink-faint);line-height:1.55;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-top:8px}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:15px 0;border-bottom:1px solid var(--line)}
  .toggle-row .t{font-weight:600}
  .toggle-row .d{font-size:12.5px;color:var(--ink-faint);margin-top:2px;max-width:330px}
  .sw-toggle{width:48px;height:28px;border-radius:20px;background:var(--panel);border:1px solid var(--line-strong);position:relative;transition:.2s;flex:none}
  .sw-toggle:after{content:"";position:absolute;width:21px;height:21px;border-radius:50%;background:var(--ink-soft);top:2.5px;left:3px;transition:.2s}
  .sw-toggle[data-on="1"]{background:var(--teal);border-color:var(--teal)}
  .sw-toggle[data-on="1"]:after{left:22px;background:#fff}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);z-index:200;
    background:var(--panel-2);border:1px solid var(--line-strong);color:var(--ink);padding:12px 20px;border-radius:12px;
    font-size:14px;box-shadow:var(--shadow);opacity:0;transition:.3s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* custom dialog (substitui confirm/prompt nativos, bloqueados em iframe/webview) */
  .dialog-bg{position:fixed;inset:0;z-index:150;background:rgba(4,9,11,.72);backdrop-filter:blur(7px);display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .2s}
  .dialog{width:100%;max-width:380px;background:var(--bg-2);border:1px solid var(--line-strong);border-radius:18px;box-shadow:var(--shadow);padding:24px;animation:rise .26s cubic-bezier(.2,.7,.2,1) both}
  .dialog .dh{font-family:'Fraunces';font-weight:400;font-size:20px;margin:0 0 8px}
  .dialog .dm{font-size:14px;line-height:1.55;color:var(--ink-soft)}
  .dialog .field{margin:16px 0 0}
  .dialog-actions{display:flex;gap:10px;margin-top:22px;justify-content:flex-end}
  .dialog-actions .btn{width:auto;margin:0;padding:11px 18px;font-size:14px}
  .btn.danger-solid{background:linear-gradient(180deg,#f0918f,var(--neg));color:#3a0d0d}

  .field textarea{width:100%;padding:13px 14px;border-radius:12px;background:var(--panel);border:1px solid var(--line);color:var(--ink);font-size:15px;font-family:inherit;resize:vertical;min-height:84px;line-height:1.5}
  .field textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 4px rgba(63,182,168,.12)}

  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes sheet{from{transform:translateY(40px);opacity:.4}to{transform:translateY(0);opacity:1}}
  @media(max-width:620px){.hero-grid{grid-template-columns:1fr;gap:22px}.chart-wrap .clabel{text-align:left}}
</style>
</head>
<body>

<!-- ============ LOCK SCREEN ============ -->
<div id="lock">
  <div class="lock-card">
    <div class="crest">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 2l8 4v5c0 5-3.5 8.5-8 11-4.5-2.5-8-6-8-11V6l8-4z" stroke="#c9a45a" stroke-width="1.4"/><path d="M9 12l2 2 4-4" stroke="#3fb6a8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h1 class="serif" id="lockTitle">Carteira</h1>
    <p class="sub" id="lockSub">Insira sua senha mestra para abrir o cofre</p>

    <div id="setupFields" class="hidden">
      <div class="field"><label>Criar senha mestra</label><input type="password" id="pw1" placeholder="mínimo 8 caracteres" autocomplete="new-password"></div>
      <div class="field"><label>Confirmar senha</label><input type="password" id="pw2" placeholder="repita a senha" autocomplete="new-password"></div>
    </div>
    <div id="unlockFields" class="hidden">
      <div class="field"><label>Senha mestra</label><input type="password" id="pwUnlock" placeholder="••••••••" autocomplete="current-password"></div>
    </div>

    <button class="btn" id="lockBtn">Desbloquear</button>
    <button class="btn face hidden" id="faceBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8V6a2 2 0 012-2h2M16 4h2a2 2 0 012 2v2M20 16v2a2 2 0 01-2 2h-2M8 20H6a2 2 0 01-2-2v-2"/><path d="M9 10h.01M15 10h.01M12 9v3l-1 1"/><path d="M9 15s1 1.2 3 1.2S15 15 15 15"/></svg>
      Desbloquear com Face ID / Touch ID
    </button>

    <div class="err" id="lockErr"></div>
    <p class="hint" id="lockHint"></p>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <header class="top">
    <div class="brand">
      <div class="crest"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2l8 4v5c0 5-3.5 8.5-8 11-4.5-2.5-8-6-8-11V6l8-4z" stroke="#c9a45a" stroke-width="1.4"/><path d="M9 12l2 2 4-4" stroke="#3fb6a8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div><h1 class="serif">Carteira</h1><div class="tag">Patrimônio Privado</div></div>
    </div>
    <div class="top-actions">
      <button class="icon-btn" id="settingsBtn" title="Configurações">

<script>
"use strict";
/* ============================================================
   SEGURANÇA — criptografia 100% no navegador (zero-knowledge)
   - Chave AES-256-GCM derivada da senha via PBKDF2-SHA256 (310k it.)
   - Dados nunca saem em texto puro; só blob cifrado em localStorage
   - Senha jamais é armazenada. Face ID (WebAuthn PRF) envelopa a chave.
   ============================================================ */
const enc = new TextEncoder(), dec = new TextDecoder();
const b64 = b => btoa(String.fromCharCode(...new Uint8Array(b)));
const unb64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
const PBKDF2_ITERS = 310000;
const LS_VAULT = "carteira.vault.v1";
const LS_WEBAUTHN = "carteira.webauthn.v1";
const LS_SESSION = "carteira.session.v1";
const GRACE_MS = 10*60*1000; // mantém desbloqueado por 10 min após fechar/ficar ocioso

async function deriveKey(password, salt){
  const base = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    {name:"PBKDF2", salt, iterations:PBKDF2_ITERS, hash:"SHA-256"},
    base, {name:"AES-GCM", length:256}, true, ["encrypt","decrypt"]
  );
}
async function encryptVault(key, obj){
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({name:"AES-GCM", iv}, key, enc.encode(JSON.stringify(obj)));
  return {iv:b64(iv), ct:b64(ct)};
}
async function decryptVault(key, iv, ct){
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:unb64(iv)}, key, unb64(ct));
  return JSON.parse(dec.decode(pt));
}

/* ---------- estado em memória (apenas enquanto desbloqueado) ---------- */
let KEY = null;          // CryptoKey AES (não exportável p/ disco)
let SALT = null;         // Uint8Array
let STATE = null;        // { baseCurrency, accounts:[...] }
let openAcctId = null;
let idleTimer = null;
let animateCards = true;   // anima cards só na entrada (não a cada re-render)
let suppressClick = false; // ignora o clique que segue um arraste
let drag = null;           // estado do arraste em andamento
let sessionKeyB64 = null;  // chave em cache p/ a janela de tolerância
let lastBump = 0;

const $ = s => document.querySelector(s);
const fmt = (n, cur) => {
  const v = Number(n)||0;
  return v.toLocaleString('pt-BR',{minimumFractionDigits:2, maximumFractionDigits:2});
};
const toast = (msg) => { const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2200); };

/* diálogos próprios — confirm()/prompt() nativos são bloqueados em iframe/preview e instáveis no mobile */
function uiConfirm(message, {title="Confirmar", okText="Confirmar", cancelText="Cancelar", danger=false}={}){
  return new Promise(resolve=>{
    const bg=document.createElement("div"); bg.className="dialog-bg";
    bg.innerHTML=`<div class="dialog">
      <h3 class="dh">${title}</h3><div class="dm">${message}</div>
      <div class="dialog-actions">
        <button class="btn sm ghost" data-r="0">${cancelText}</button>
        <button class="btn sm ${danger?'danger-solid':''}" data-r="1">${okText}</button>
      </div></div>`;
    const done=v=>{ bg.remove(); resolve(v); };
    bg.addEventListener("click",e=>{ if(e.target===bg) return done(false); const b=e.target.closest("[data-r]"); if(b) done(b.dataset.r==="1"); });
    document.body.appendChild(bg);
  });
}
function uiPrompt(message, {title="", placeholder="", type="text", okText="Confirmar"}={}){
  return new Promise(resolve=>{
    const bg=document.createElement("div"); bg.className="dialog-bg";
    bg.innerHTML=`<div class="dialog">
      ${title?`<h3 class="dh">${title}</h3>`:""}<div class="dm">${message}</div>
      <div class="field"><input id="dlgIn" type="${type}" placeholder="${placeholder}"></div>
      <div class="dialog-actions">
        <button class="btn sm ghost" data-r="0">Cancelar</button>
        <button class="btn sm" data-r="1">${okText}</button>
      </div></div>`;
    const inp=()=>bg.querySelector("#dlgIn");
    const done=v=>{ bg.remove(); resolve(v); };
    bg.addEventListener("click",e=>{ if(e.target===bg) return done(null); const b=e.target.closest("[data-r]"); if(b) done(b.dataset.r==="1"? inp().value : null); });
    bg.addEventListener("keydown",e=>{ if(e.key==="Enter") done(inp().value); if(e.key==="Escape") done(null); });
    document.body.appendChild(bg);
    setTimeout(()=>inp().focus(),60);
  });
}

/* ============================================================
   LOCK SCREEN
   ============================================================ */
function hasVault(){ return !!localStorage.getItem(LS_VAULT); }

function showLock(){
  $("#app").classList.add("hidden");
  $("#lock").classList.remove("hidden");
  $("#lockErr").textContent = "";
  const setup = !hasVault();
  $("#setupFields").classList.toggle("hidden", !setup);
  $("#unlockFields").classList.toggle("hidden", setup);
  $("#lockTitle").textContent = setup ? "Criar cofre" : "Carteira";
  $("#lockSub").textContent = setup
    ? "Defina uma senha mestra forte. Ela é a única chave dos seus dados."
    : "Insira sua senha mestra para abrir o cofre";
  $("#lockBtn").textContent = setup ? "Criar cofre seguro" : "Desbloquear";
  $("#lockHint").innerHTML = setup
    ? "Não há recuperação de senha — se esquecê-la, os dados são irrecuperáveis (esse é justamente o que torna o cofre seguro)."
    : "";
  // Face ID disponível?
  const wa = localStorage.getItem(LS_WEBAUTHN);
  const canFace = !setup && wa && window.PublicKeyCredential && location.protocol==="https:";
  $("#faceBtn").classList.toggle("hidden", !canFace);
  setTimeout(()=> (setup?$("#pw1"):$("#pwUnlock")).focus(), 120);
}

async function doSetup(){
  const p1=$("#pw1").value, p2=$("#pw2").value;
  if(p1.length<8) return ($("#lockErr").textContent="A senha precisa ter ao menos 8 caracteres.");
  if(p1!==p2) return ($("#lockErr").textContent="As senhas não coincidem.");
  $("#lockBtn").disabled=true; $("#lockBtn").textContent="Criando…";
  SALT = crypto.getRandomValues(new Uint8Array(16));
  KEY = await deriveKey(p1, SALT);
  STATE = { baseCurrency:"AED", rates:{}, accounts:[] };
  await persist();
  $("#lockBtn").disabled=false;
  enterApp();
}

async function doUnlock(){
  const pw=$("#pwUnlock").value;
  if(!pw) return;
  $("#lockBtn").disabled=true; $("#lockBtn").textContent="Verificando…";
  try{
    const stored = JSON.parse(localStorage.getItem(LS_VAULT));
    SALT = unb64(stored.salt);
    KEY = await deriveKey(pw, SALT);
    STATE = await decryptVault(KEY, stored.iv, stored.ct);
    enterApp();
  }catch(e){
    $("#lockErr").textContent="Senha incorreta.";
    KEY=null; STATE=null;
  }finally{
    $("#lockBtn").disabled=false; $("#lockBtn").textContent="Desbloquear";
  }
}

async function persist(){
  const {iv, ct} = await encryptVault(KEY, STATE);
  localStorage.setItem(LS_VAULT, JSON.stringify({v:1, kdf:{iters:PBKDF2_ITERS,hash:"SHA-256"}, salt:b64(SALT), iv, ct}));
}

function lockNow(){
  clearTimeout(idleTimer);
  KEY=null; STATE=null; openAcctId=null;
  clearSession();
  closeModal();
  showLock();
}

function enterApp(){
  $("#lock").classList.add("hidden");
  $("#app").classList.remove("hidden");
  $("#pwUnlock").value=""; $("#pw1").value=""; $("#pw2").value="";
  migrate();
  animateCards=true;
  render();
  bumpSession();
  armIdle();
}

/* ---------- janela de tolerância de 10 min ----------
   Ao fechar/minimizar o app NÃO bloqueia na hora: guarda a sessão por 10 min.
   Reabrindo dentro de 10 min, entra direto; após 10 min, pede a senha.        */
async function bumpSession(){
  if(!KEY) return;
  try{
    if(!sessionKeyB64){ const raw=await crypto.subtle.exportKey("raw", KEY); sessionKeyB64=b64(raw); }
    localStorage.setItem(LS_SESSION, JSON.stringify({ k:sessionKeyB64, exp:Date.now()+GRACE_MS }));
  }catch(e){}
}
function readSession(){ try{ return JSON.parse(localStorage.getItem(LS_SESSION)); }catch(e){ return null; } }
function clearSession(){ localStorage.removeItem(LS_SESSION); sessionKeyB64=null; }

async function tryResume(){
  const s=readSession();
  if(s && s.exp>Date.now() && s.k && hasVault()){
    try{
      const stored=JSON.parse(localStorage.getItem(LS_VAULT));
      SALT=unb64(stored.salt);
      KEY=await crypto.subtle.importKey("raw", unb64(s.k), {name:"AES-GCM"}, true, ["encrypt","decrypt"]);
      STATE=await decryptVault(KEY, stored.iv, stored.ct);
      sessionKeyB64=s.k;
      enterApp();
      return true;
    }catch(e){ KEY=null; STATE=null; }
  }
  clearSession();
  return false;
}

function armIdle(){
  clearTimeout(idleTimer);
  idleTimer=setTimeout(()=>{ if(KEY){ toast("Bloqueado por inatividade"); lockNow(); } }, GRACE_MS);
}
function onActivity(){
  if(!KEY) return;
  armIdle();
  const now=Date.now();
  if(now-lastBump>20000){ lastBump=now; bumpSession(); } // renova a janela (no máx. a cada 20s)
}
["click","keydown","touchstart","pointerdown","mousemove"].forEach(e=>document.addEventListener(e,onActivity,{passive:true}));

document.addEventListener("visibilitychange",()=>{
  if(!KEY) return;
  if(document.hidden){
    clearTimeout(idleTimer);   // sem bloqueio imediato
    bumpSession();             // 10 min a partir de agora
  }else{
    const s=readSession();
    if(!s || s.exp<Date.now()){ lockNow(); }  // passou de 10 min em segundo plano → pede senha
    else armIdle();
  }
});
window.addEventListener("pagehide",()=>{ if(KEY) bumpSession(); });

/* ============================================================
   FACE ID / TOUCH ID  (WebAuthn + extensão PRF)
   ============================================================ */
function bufToB64(b){ return b64(b); }
async function prfFromAssertion(credId, prfSalt){
  const assertion = await navigator.credentials.get({ publicKey:{
    challenge: crypto.getRandomValues(new Uint8Array(32)),
    allowCredentials: credId ? [{id:unb64(credId), type:"public-key"}] : [],
    userVerification:"required",
    timeout:60000,
    extensions:{ prf:{ eval:{ first: unb64(prfSalt) } } }
  }});
  const ext = assertion.getClientExtensionResults();
  if(!ext.prf || !ext.prf.results || !ext.prf.results.first) throw new Error("PRF indisponível");
  return { secret:new Uint8Array(ext.prf.results.first), credId: bufToB64(assertion.rawId) };
}
async function wrapKeyWith(secret){
  return crypto.subtle.importKey("raw", secret, {name:"AES-GCM"}, false, ["encrypt","decrypt"]);
}
async function enableFaceID(){
  if(!window.PublicKeyCredential || location.protocol!=="https:"){
    toast("Face ID exige HTTPS (funciona após publicar no GitHub Pages)."); return false;
  }
  try{
    const userId = crypto.getRandomValues(new Uint8Array(16));
    const prfSalt = crypto.getRandomValues(new Uint8Array(32));
    const cred = await navigator.credentials.create({ publicKey:{
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      rp:{ name:"Carteira", id:location.hostname },
      user:{ id:userId, name:"cofre", displayName:"Cofre" },
      pubKeyCredParams:[{type:"public-key",alg:-7},{type:"public-key",alg:-257}],
      authenticatorSelection:{ userVerification:"required", residentKey:"required" },
      timeout:60000,
      extensions:{ prf:{} }
    }});
    const credId = bufToB64(cred.rawId);
    // obter o segredo PRF via get()
    const { secret } = await prfFromAssertion(credId, bufToB64(prfSalt));
    // exportar a chave mestra e envelopá-la com o segredo PRF
    const rawKey = await crypto.subtle.exportKey("raw", KEY);
    const wrapKey = await wrapKeyWith(secret);
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const wrapped = await crypto.subtle.encrypt({name:"AES-GCM",iv}, wrapKey, rawKey);
    localStorage.setItem(LS_WEBAUTHN, JSON.stringify({credId, prfSalt:bufToB64(prfSalt), iv:b64(iv), wrapped:b64(wrapped)}));
    toast("Face ID ativado neste dispositivo.");
    return true;
  }catch(e){
    console.warn(e);
    toast("Não foi possível ativar Face ID (PRF não suportado neste navegador).");
    return false;
  }
}
async function unlockWithFace(){
  $("#lockErr").textContent="";
  try{
    const wa = JSON.parse(localStorage.getItem(LS_WEBAUTHN));
    const { secret } = await prfFromAssertion(wa.credId, wa.prfSalt);
    const wrapKey = await wrapKeyWith(secret);
    const rawKey = await crypto.subtle.decrypt({name:"AES-GCM",iv:unb64(wa.iv)}, wrapKey, unb64(wa.wrapped));
    KEY = await crypto.subtle.importKey("raw", rawKey, {name:"AES-GCM"}, true, ["encrypt","decrypt"]);
    const stored = JSON.parse(localStorage.getItem(LS_VAULT));
    SALT = unb64(stored.salt);
    STATE = await decryptVault(KEY, stored.iv, stored.ct);
    enterApp();
  }catch(e){
    console.warn(e);
    $("#lockErr").textContent="Face ID falhou. Use a senha mestra.";
  }
}

/* ============================================================
   CÁLCULOS  — saldo atual, rendimento 12M, totalizador
   ============================================================ */
function sortedMonths(acc){
  return Object.keys(acc.balances||{}).sort(); // "YYYY-MM" ascendente
}
function currentBalance(acc){
  const m = sortedMonths(acc); if(!m.length) return null;
  return Number(acc.balances[m[m.length-1]].saldo)||0;
}
function lastUpdated(acc){
  const m = sortedMonths(acc); return m.length? m[m.length-1] : null;
}
// rendimento real ≈ (saldoFim - saldoInício - aportesLíquidos) / saldoInício
function yield12m(acc){
  const months = sortedMonths(acc);
  if(months.length<2) return null;
  const last = months[months.length-1];
  // mês ~12 meses antes (o mais antigo dentro de até 12 meses, senão o mais antigo disponível)
  const target = shiftMonth(last, -12);
  let startKey = months.find(m=>m>=target) ?? months[0];
  if(startKey===last) return null;
  const startB = Number(acc.balances[startKey].saldo)||0;
  const endB = Number(acc.balances[last].saldo)||0;
  if(startB<=0) return null;
  // soma de aportes entre (startKey, last]
  let flows=0;
  for(const m of months){ if(m>startKey && m<=last) flows += Number(acc.balances[m].aporte)||0; }
  return ((endB - startB - flows) / startB) * 100;
}
function shiftMonth(ym, delta){
  let [y,m]=ym.split("-").map(Number); m+=delta;
  while(m<1){m+=12;y--;} while(m>12){m-=12;y++;}
  return `${y}-${String(m).padStart(2,"0")}`;
}
function monthLabel(ym){
  const [y,m]=ym.split("-"); const names=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
  return `${names[+m-1]}/${y.slice(2)}`;
}
/* ---------- multi-moeda ---------- */
const CURRENCIES = ["AED","BRL","USD","EUR"];
function migrate(){
  if(!STATE.rates) STATE.rates = {};
  STATE.accounts.forEach(a=>{
    if(!a.currency) a.currency = STATE.baseCurrency;
    if(a.investment === undefined) a.investment = (a.type === "bank"); // contas bancárias entram por padrão; ajuste manual
    if(a.notes === undefined) a.notes = "";
  });
}
// rate[cur] = valor de 1 unidade de `cur` na moeda base. Base = 1. null = sem cotação.
function rateFor(cur){
  if(cur === STATE.baseCurrency) return 1;
  const r = STATE.rates && Number(STATE.rates[cur]);
  return (r && r > 0) ? r : null;
}
function usedCurrencies(){
  const s = new Set();
  STATE.accounts.forEach(a=>{ if(a.currency && a.currency !== STATE.baseCurrency) s.add(a.currency); });
  return [...s].sort();
}
function missingRateCurrencies(){
  return usedCurrencies().filter(c => rateFor(c) === null && STATE.accounts.some(a=>a.currency===c && currentBalance(a)!=null));
}
// linha pequena com o valor (em moeda base) convertido para as demais moedas em uso
function convAltLine(baseAmount){
  const parts=[];
  usedCurrencies().forEach(c=>{ const r=rateFor(c); if(r!=null && r>0) parts.push(`${c} ${fmt(baseAmount/r)}`); });
  return parts.length ? "≈ "+parts.join("   ·   ") : "";
}

// série mensal (em moeda base) de um conjunto de contas — últimos 12 pontos
function seriesBase(accts){
  const set=new Set();
  accts.forEach(a=>sortedMonths(a).forEach(m=>set.add(m)));
  let months=[...set].sort();
  if(!months.length) return [];
  months = months.slice(-12);
  return months.map(m=>{
    let total=0;
    accts.forEach(a=>{
      const ms=sortedMonths(a).filter(x=>x<=m);
      const r=rateFor(a.currency);
      if(ms.length && r!=null) total += (Number(a.balances[ms[ms.length-1]].saldo)||0) * r;
    });
    return {m, total};
  });
}
function portfolioStats(){
  const all = STATE.accounts;
  const inv = all.filter(a=>a.investment);
  let total=0, invested=0;
  all.forEach(a=>{ const cb=currentBalance(a); const r=rateFor(a.currency); if(cb!=null && r!=null) total += cb*r; });
  inv.forEach(a=>{ const cb=currentBalance(a); const r=rateFor(a.currency); if(cb!=null && r!=null) invested += cb*r; });

  // rendimento da carteira de INVESTIMENTOS: série em base com taxa atual constante → o câmbio
  // se cancela dentro de cada conta, resultando num retorno ponderado pelo tamanho de cada conta.
  const series = seriesBase(inv);
  let weightedYield=null;
  if(series.length>=2){
    const first=series[0], last=series[series.length-1];
    let netFlows=0;
    inv.forEach(a=>{ const r=rateFor(a.currency)||0; sortedMonths(a).forEach(m=>{ if(m>first.m && m<=last.m) netFlows += (Number(a.balances[m].aporte)||0)*r; }); });
    if(first.total>0) weightedYield = ((last.total - first.total - netFlows)/first.total)*100;
  }
  return { total, invested, weightedYield, count:all.length, invCount:inv.length, missing:missingRateCurrencies() };
}

/* ============================================================
   ARRASTAR PARA REORDENAR  (segurar ~280ms e arrastar; touch + mouse)
   - toque rápido = abre a conta;  segurar e mover = reordena
   ============================================================ */
const HOLD_MS = 280, MOVE_CANCEL = 10;
function attachDrag(el, id){
  el.addEventListener("pointerdown", e=>{
    if(e.pointerType==="mouse" && e.button!==0) return;
    drag = { id, el, sx:e.clientX, sy:e.clientY, pid:e.pointerId, started:false, target:null };
    drag.timer = setTimeout(()=>beginDrag(), HOLD_MS);
    window.addEventListener("pointermove", onDragMove, {passive:false});
    window.addEventListener("pointerup", onDragUp, {passive:false});
    window.addEventListener("pointercancel", onDragUp, {passive:false});
  });
}
function beginDrag(){
  if(!drag) return;
  drag.started = true;
  try{ drag.el.setPointerCapture(drag.pid); }catch(e){}
  drag.el.classList.add("dragging");
  document.body.style.userSelect="none";
  if(navigator.vibrate) navigator.vibrate(8);
}
function onDragMove(e){
  if(!drag) return;
  const dx=e.clientX-drag.sx, dy=e.clientY-drag.sy;
  if(!drag.started){
    if(Math.hypot(dx,dy) > MOVE_CANCEL){ clearTimeout(drag.timer); teardownDrag(); } // rolando a tela
    return;
  }
  e.preventDefault();
  drag.el.style.transform = `translate(${dx}px,${dy}px) scale(1.05)`;
  const under = document.elementFromPoint(e.clientX, e.clientY);
  const card = under && under.closest(".card");
  document.querySelectorAll(".card.drop-target").forEach(c=>c.classList.remove("drop-target"));
  if(card && card!==drag.el && card.dataset.id){ card.classList.add("drop-target"); drag.target = card.dataset.id; }
  else drag.target = null;
}
function onDragUp(){
  if(!drag) return;
  clearTimeout(drag.timer);
  const wasDrag = drag.started, fromId = drag.id, toId = drag.target;
  teardownDrag();
  if(wasDrag){
    suppressClick = true;
    setTimeout(()=>{ suppressClick=false; }, 350);
    if(toId && toId!==fromId) reorderAccounts(fromId, toId);
    else render(); // solto fora: desfaz o transform
  }
}
function teardownDrag(){
  window.removeEventListener("pointermove", onDragMove);
  window.removeEventListener("pointerup", onDragUp);
  window.removeEventListener("pointercancel", onDragUp);
  document.body.style.userSelect="";
  document.querySelectorAll(".card.drop-target").forEach(c=>c.classList.remove("drop-target"));
  if(drag && drag.el){ drag.el.classList.remove("dragging"); drag.el.style.transform=""; }
  drag = null;
}
async function reorderAccounts(fromId, toId){
  const from = STATE.accounts.findIndex(a=>a.id===fromId);
  const toOrig = STATE.accounts.findIndex(a=>a.id===toId);
  if(from<0 || toOrig<0 || from===toOrig) return;
  const [item] = STATE.accounts.splice(from,1);
  let to = STATE.accounts.findIndex(a=>a.id===toId);
  if(from < toOrig) to += 1; // arrastando para frente: o card assume a posição do alvo
  STATE.accounts.splice(to,0,item);
  await persist();
  render();
}

const PALETTE = ["#3fb6a8","#c9a45a","#7aa2f7","#e57373","#9ece6a","#bb9af7","#e0af68","#5fb3b3"];

function render(){

    const acccolor=a.color||PALETTE[i%PALETTE.length];

    const el=document.createElement("div");

    el.innerHTML=`

        ${chip}
      </div>
      <div>
        <div class="bal"><span class="c">${cur}</span>${cb!=null?fmt(cb):"—"} ${noRate?'<span class="needrate" title="Sem cotação definida">⚠</span>':''}</div>
        <div class="card-foot">
          ${a.investment ? yieldBadge(y) : '<span></span>'}
          <span class="updated">${lu?('atual. '+monthLabel(lu)):'sem dados'}</span>
        </div>

    el.onclick=()=>{ if(suppressClick){ suppressClick=false; return; } openAccount(a.id); };
    attachDrag(el, a.id);
    wrap.appendChild(el);
  });

  const add=document.createElement("button");

  add.onclick=()=>openAccount(null);

}
function setSigned(el, v){
  if(v==null){ el.textContent="—"; el.className="v"; return; }
  el.textContent=(v>=0?"+":"")+v.toFixed(2)+"%";
  el.className="v "+(v>=0?"pos":"neg");
}
function yieldBadge(y){
  if(y==null) return `<span class="yield" style="color:var(--ink-faint)">—</span>`;
  const up=y>=0;
  return `<span class="yield ${up?'pos':'neg'}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">${up?'<path d="M5 15l7-7 7 7"/>':'<path d="M19 9l-7 7-7-7"/>'}</svg>
    ${(up?"+":"")+y.toFixed(2)}%</span>`;
}
function drawSpark(series){
  const svg=$("#spark"); svg.innerHTML="";
  if(series.length<2){ svg.innerHTML=`<text x="160" y="64" fill="#6e8a90" font-size="12" text-anchor="middle" font-family="Manrope">Adicione saldos em ao menos 2 meses</text>`; return; }
  const W=320,H=120,pad=8;
  const vals=series.map(s=>s.total);
  const min=Math.min(...vals), max=Math.max(...vals), span=(max-min)||1;
  const x=i=>pad+(i*(W-2*pad))/(series.length-1);
  const yv=v=>H-pad-((v-min)/span)*(H-2*pad-10);
  let d="", area="";
  series.forEach((s,i)=>{ const px=x(i),py=yv(s.total); d+=(i?"L":"M")+px.toFixed(1)+" "+py.toFixed(1)+" "; });
  area=d+`L ${x(series.length-1).toFixed(1)} ${H-pad} L ${x(0).toFixed(1)} ${H-pad} Z`;
  const up = vals[vals.length-1] >= vals[0];
  const col = up ? "#52c79a" : "#e57373";
  svg.innerHTML=`
    <defs><linearGradient id="g" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="${col}" stop-opacity=".28"/><stop offset="1" stop-color="${col}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#g)"/>
    <path d="${d}" fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${x(series.length-1).toFixed(1)}" cy="${yv(vals[vals.length-1]).toFixed(1)}" r="3.4" fill="${col}"/>`;
}
const esc = s => String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function openAccount(id){
  const isNew = !id;
  let acc = isNew

  const months=sortedMonths(acc).slice().reverse();

  openModal(`
    <div class="modal-head">
      <h3>${isNew?"Nova conta":esc(acc.name||"Conta")}</h3>

    </div>

      ${isNew?"":`<div class="acct-summary">
        <div class="mini"><div class="k">Saldo atual</div><div class="v">${cb!=null?cur+" "+fmt(cb):"—"}</div></div>
        <div class="mini"><div class="k">Rendimento 12M</div><div class="v ${y==null?'':(y>=0?'pos':'neg')}">${y==null?"—":(y>=0?"+":"")+y.toFixed(2)+"%"}</div></div>

      <div class="form-row">
        <div class="field"><label>Instituição (opcional)</label><input id="fInst" value="${esc(acc.institution||"")}" placeholder="Ex.: ADCB, Itaú, Carteira"></div>
        <div class="field" style="max-width:150px"><label>Tipo</label>

        </div>
      </div>
      <div class="form-row">
        <div class="field" style="max-width:150px"><label>Moeda</label>
          <select id="fCur">${CURRENCIES.map(c=>`<option ${cur===c?'selected':''}>${c}</option>`).join("")}</select>

      <div class="toggle-row">
        <div><div class="t">Conta de investimento</div><div class="d">Só contas marcadas entram no cálculo do <b>rendimento total (%)</b> da carteira.</div></div>

      <div class="field" style="margin-top:16px"><label>Dados da conta (opcional)</label>
        <textarea id="fNotes" placeholder="Nº da conta, IBAN, agência, corretora, titularidade, observações…">${esc(acc.notes||"")}</textarea>
        <div class="note" style="margin-top:8px">Tudo aqui é guardado <b>cifrado</b> no cofre — seguro para anotar números de conta e dados sensíveis.</div>
      </div>

      <div class="sec-head" style="margin:24px 4px 6px"><h2 class="serif" style="font-size:18px">Saldo por mês</h2></div>
      <div class="note">Informe o <b>saldo de fim de mês</b> (na moeda da conta). O campo <b>aporte</b> (opcional) é o quanto você depositou/sacou no mês — usado para calcular o rendimento real, separando o que rendeu do que você adicionou.</div>
      <table class="months">
        <thead><tr><th style="width:30%">Mês</th><th style="text-align:right">Saldo (<span id="curLbl">${cur}</span>)</th><th style="text-align:right">Aporte</th><th></th></tr></thead>
        <tbody id="mBody"></tbody>
      </table>
      <div class="add-month">
        <div class="field" style="margin:0;flex:1"><label>Adicionar mês</label><input type="month" id="newMonth" value="${defYM}"></div>
        <button class="btn sm ghost" id="addMonth">Adicionar</button>
      </div>

      <div class="btn-row">
        <button class="btn" id="saveAcct">${isNew?"Criar conta":"Salvar alterações"}</button>
        ${isNew?"":'<button class="btn sm ghost danger" id="delAcct">Excluir</button>'}
      </div>
    </div>
  `);

  // swatches
  const swWrap=$("#sw");
  PALETTE.forEach(c=>{
    const s=document.createElement("div"); s.className="sw"; s.style.background=c; s.dataset.on=(c===acc.color)?"1":"0";
    s.onclick=()=>{ acc.color=c; [...swWrap.children].forEach(x=>x.dataset.on="0"); s.dataset.on="1"; };
    swWrap.appendChild(s);
  });

  // moeda + investimento
  $("#fCur").onchange = e => { acc.currency = e.target.value; cur = acc.currency; $("#curLbl").textContent = cur; };
  $("#fInvest").onclick = () => { const t=$("#fInvest"); const on=t.dataset.on==="1"; t.dataset.on = on?"0":"1"; acc.investment = !on; };

  function renderMonths(){
    const body=$("#mBody"); body.innerHTML="";
    const ms=sortedMonths(acc).slice().reverse();
    if(!ms.length){ body.innerHTML=`<tr><td colspan="4" style="color:var(--ink-faint);padding:14px 8px">Nenhum mês ainda. Adicione abaixo.</td></tr>`; return; }

    body.querySelectorAll(".mAporte").forEach(i=>i.oninput=e=>{ acc.balances[e.target.dataset.m].aporte=parseNum(e.target.value); });
    body.querySelectorAll(".del button").forEach(b=>b.onclick=e=>{ delete acc.balances[e.target.dataset.m]; renderMonths(); });
  }
  renderMonths();

  $("#addMonth").onclick=()=>{
    const ym=$("#newMonth").value; if(!ym) return;
    if(!acc.balances[ym]) acc.balances[ym]={saldo:"",aporte:""};
    renderMonths();
    // foca no saldo do mês recém-criado
    const inp=$("#mBody").querySelector(`.mSaldo[data-m="${ym}"]`); if(inp) inp.focus();
  };
  $("#mClose").onclick=closeModal;
  $("#saveAcct").onclick=async()=>{
    acc.name=$("#fName").value.trim();
    acc.institution=$("#fInst").value.trim();
    acc.type=$("#fType").value;
    acc.currency=$("#fCur").value;
    acc.investment=$("#fInvest").dataset.on==="1";
    acc.notes=$("#fNotes").value;
    if(!acc.name) return toast("Dê um nome à conta.");
    // limpa meses sem saldo
    for(const m of Object.keys(acc.balances)){ if(acc.balances[m].saldo===""||acc.balances[m].saldo==null) delete acc.balances[m]; }
    if(isNew) STATE.accounts.push(acc);
    else { const idx=STATE.accounts.findIndex(a=>a.id===id); STATE.accounts[idx]=acc; }
    await persist(); render(); closeModal(); toast("Salvo com segurança.");
  };
  const del=$("#delAcct"); if(del) del.onclick=async()=>{
    if(!(await uiConfirm(`Excluir a conta <b>${esc(acc.name||"")}</b> e todo o histórico de saldos? Esta ação não pode ser desfeita.`, {title:"Excluir conta", okText:"Excluir", danger:true}))) return;
    STATE.accounts=STATE.accounts.filter(a=>a.id!==id);
    await persist(); render(); closeModal(); toast("Conta excluída.");
  };
}
function parseNum(s){ if(s==="") return ""; const n=Number(String(s).replace(/\s/g,"").replace(",",".")); return isNaN(n)?"":n; }

   CONFIGURAÇÕES — moeda, Face ID, senha, backup, apagar
   ============================================================ */
function openSettings(){
  const faceOn = !!localStorage.getItem(LS_WEBAUTHN);
  openModal(`
    <div class="modal-head"><h3>Configurações</h3>
      <button class="close" id="sClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>
    <div class="modal-body">
      <div class="form-row"><div class="field"><label>Moeda base</label>
        <select id="setCur">
          ${CURRENCIES.map(c=>`<option ${STATE.baseCurrency===c?'selected':''}>${c}</option>`).join("")}
        </select></div></div>

      <div class="sec-head" style="margin:18px 4px 4px"><h2 class="serif" style="font-size:18px">Câmbio</h2></div>
      <div class="note">Quanto vale <b>1 unidade</b> de cada moeda na sua moeda base (${STATE.baseCurrency}). Edite à mão ou puxe a cotação online. As cotações ficam salvas no cofre cifrado.</div>
      <div id="ratesList" style="margin-top:6px"></div>
      <div class="btn-row" style="margin-top:12px">
        <button class="btn sm ghost" id="fetchRates">Atualizar cotações online</button>
      </div>

      <div class="toggle-row">
        <div><div class="t">Face ID / Touch ID</div><div class="d">Desbloqueio biométrico neste dispositivo. A chave é envelopada pelo seu sensor (WebAuthn PRF) — exige HTTPS.</div></div>
        <button class="sw-toggle" id="faceToggle" data-on="${faceOn?1:0}"></button>
      </div>

      <div class="toggle-row" style="border:none">
        <div><div class="t">Backup cifrado</div><div class="d">Exporta um arquivo já criptografado. Inútil sem a sua senha — seguro para guardar onde quiser.</div></div>
      </div>
      <div class="btn-row" style="margin-top:0">
        <button class="btn sm ghost" id="exp">Exportar backup</button>
        <button class="btn sm ghost" id="imp">Importar backup</button>
        <input type="file" id="impFile" accept="application/json" class="hidden">
      </div>

      <div class="sec-head" style="margin:26px 4px 6px"><h2 class="serif" style="font-size:18px">Segurança</h2></div>
      <div class="btn-row" style="margin-top:6px">
        <button class="btn sm ghost" id="chgPw">Trocar senha mestra</button>
        <button class="btn sm ghost danger" id="wipe">Apagar tudo</button>
      </div>
      <div class="note" style="margin-top:18px">Seus dados financeiros ficam cifrados neste navegador e nunca são enviados a servidores. Por conveniência, o app continua aberto por <b>10 min</b> após você fechá-lo ou deixá-lo ocioso — nesse intervalo a chave fica guardada no dispositivo; depois disso, a senha é exigida de novo. Toque no cadeado para bloquear na hora. A única chamada de rede possível é a busca opcional de cotações (envia só o código da moeda base). A senha mestra nunca é gravada.</div>
    </div>
  `);
  $("#sClose").onclick=closeModal;
  $("#setCur").onchange=async e=>{
    if(usedCurrencies().length && !(await uiConfirm("Trocar a moeda base invalida as cotações atuais. Você precisará atualizá-las. Continuar?", {title:"Trocar moeda base", okText:"Trocar"}))){ e.target.value=STATE.baseCurrency; return; }
    STATE.baseCurrency=e.target.value; STATE.rates={};
    await persist(); render(); openSettings();
  };

  function renderRates(){
    const list=$("#ratesList"); const used=usedCurrencies();
    if(!used.length){ list.innerHTML=`<div class="note" style="margin-top:8px">Nenhuma conta em moeda diferente de ${STATE.baseCurrency}.</div>`; return; }
    list.innerHTML="";
    used.forEach(c=>{
      const row=document.createElement("div"); row.className="rate-row";
      const val = STATE.rates[c]!=null ? STATE.rates[c] : "";
      row.innerHTML=`<span class="rl">1 ${c} =</span><input data-c="${c}" inputmode="decimal" value="${val}" placeholder="?"><span class="rb">${STATE.baseCurrency}</span>`;
      list.appendChild(row);
    });
    list.querySelectorAll("input").forEach(i=>i.onchange=async e=>{
      const v=parseNum(e.target.value);
      if(v==="" || v<=0) delete STATE.rates[e.target.dataset.c]; else STATE.rates[e.target.dataset.c]=v;
      await persist(); render();
    });
  }
  renderRates();

  $("#fetchRates").onclick=async()=>{
    const used=usedCurrencies();
    if(!used.length) return toast("Nenhuma moeda estrangeira para cotar.");
    const btn=$("#fetchRates"); btn.disabled=true; btn.textContent="Buscando…";
    try{
      const res=await fetch(`https://open.er-api.com/v6/latest/${STATE.baseCurrency}`);
      const data=await res.json();
      if(data.result!=="success"||!data.rates) throw new Error("resposta inválida");
      let n=0;
      used.forEach(c=>{ const perBase=data.rates[c]; if(perBase>0){ STATE.rates[c]=1/perBase; n++; } }); // 1 c = (1 / (c por base)) base
      await persist(); render(); renderRates();
      toast(n?`Cotações atualizadas (${n}).`:"Nenhuma moeda reconhecida.");
    }catch(e){
      console.warn(e);
      toast("Falha ao buscar cotações. Edite manualmente.");
    }finally{ btn.disabled=false; btn.textContent="Atualizar cotações online"; }
  };
  $("#faceToggle").onclick=async()=>{
    const on=$("#faceToggle").dataset.on==="1";
    if(on){ localStorage.removeItem(LS_WEBAUTHN); $("#faceToggle").dataset.on="0"; toast("Face ID desativado."); }
    else { const ok=await enableFaceID(); if(ok)$("#faceToggle").dataset.on="1"; }
  };
  $("#exp").onclick=()=>{
    const blob=new Blob([localStorage.getItem(LS_VAULT)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download=`carteira-backup-${new Date().toISOString().slice(0,10)}.json`; a.click();
    toast("Backup cifrado exportado.");
  };
  $("#imp").onclick=()=>$("#impFile").click();
  $("#impFile").onchange=async e=>{
    const file=e.target.files[0]; if(!file) return;
    const txt=await file.text();
    try{
      const obj=JSON.parse(txt);
      if(!obj.salt||!obj.iv||!obj.ct) throw new Error();
      if(!(await uiConfirm("Importar substituirá o cofre atual deste dispositivo. Você precisará da senha do backup. Continuar?", {title:"Importar backup", okText:"Importar"}))) return;
      localStorage.setItem(LS_VAULT, txt);
      localStorage.removeItem(LS_WEBAUTHN);
      toast("Backup importado. Desbloqueie com a senha dele.");
      lockNow();
    }catch{ toast("Arquivo inválido."); }
  };
  $("#chgPw").onclick=async()=>{
    const np=await uiPrompt("Defina a nova senha mestra (mínimo 8 caracteres).", {title:"Trocar senha mestra", type:"password", placeholder:"nova senha", okText:"Continuar"});
    if(np==null) return;
    if(np.length<8) return toast("Senha muito curta (mín. 8).");
    const np2=await uiPrompt("Repita a nova senha para confirmar.", {title:"Confirmar senha", type:"password", placeholder:"repita a senha", okText:"Salvar"});
    if(np2==null) return;
    if(np2!==np) return toast("As senhas não coincidem.");
    SALT=crypto.getRandomValues(new Uint8Array(16));
    KEY=await deriveKey(np, SALT);
    localStorage.removeItem(LS_WEBAUTHN); // invalida envelope antigo do Face ID
    sessionKeyB64=null; // recria o cache da sessão com a nova chave
    await persist();
    await bumpSession();
    toast("Senha alterada. Reative o Face ID se desejar.");
    closeModal();
  };
  $("#wipe").onclick=async()=>{
    if(!(await uiConfirm("Apagar <b>TODO</b> o cofre deste dispositivo? Sem um backup, é irreversível.", {title:"Apagar tudo", okText:"Apagar tudo", danger:true}))) return;
    localStorage.removeItem(LS_VAULT); localStorage.removeItem(LS_WEBAUTHN); clearSession();
    KEY=null; STATE=null; toast("Tudo apagado."); showLock();
  };
}
